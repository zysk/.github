name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
      attributes:
            value: |
                    Thanks for taking the time to report a bug! Please fill in as much detail as possible.
                            Before submitting, check if a similar issue already exists.

                              - type: textarea
                                  id: bug-description
                                      attributes:
                                            label: Description
                                                  description: A clear and concise description of the bug — what happened vs. what you expected.
                                                      validations:
                                                            required: true

                                                              - type: textarea
                                                                  id: steps-to-reproduce
                                                                      attributes:
                                                                            label: Steps to Reproduce
                                                                                  description: Step-by-step instructions to reproduce the behavior.
                                                                                        placeholder: |
                                                                                                1. Go to '...'
                                                                                                        2. Click on '...'
                                                                                                                3. Scroll down to '...'
                                                                                                                        4. See error
                                                                                                                            validations:
                                                                                                                                  required: true
                                                                                                                                  
                                                                                                                                    - type: textarea
                                                                                                                                        id: expected-behavior
                                                                                                                                            attributes:
                                                                                                                                                  label: Expected Behavior
                                                                                                                                                        description: What did you expect to happen?
                                                                                                                                                            validations:
                                                                                                                                                                  required: true
                                                                                                                                                                  
                                                                                                                                                                    - type: textarea
                                                                                                                                                                        id: actual-behavior
                                                                                                                                                                            attributes:
                                                                                                                                                                                  label: Actual Behavior
                                                                                                                                                                                        description: What actually happened?
                                                                                                                                                                                            validations:
                                                                                                                                                                                                  required: true
                                                                                                                                                                                                  
                                                                                                                                                                                                    - type: dropdown
                                                                                                                                                                                                        id: severity
                                                                                                                                                                                                            attributes:
                                                                                                                                                                                                                  label: Severity
                                                                                                                                                                                                                        description: How severe is the impact of this bug?
                                                                                                                                                                                                                              options:
                                                                                                                                                                                                                                      - "Critical — system unusable / data loss"
                                                                                                                                                                                                                                              - "High — major feature broken"
                                                                                                                                                                                                                                                      - "Medium — feature partially broken, workaround exists"
                                                                                                                                                                                                                                                              - "Low — minor issue / cosmetic"
                                                                                                                                                                                                                                                                  validations:
                                                                                                                                                                                                                                                                        required: true
                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                          - type: textarea
                                                                                                                                                                                                                                                                              id: environment
                                                                                                                                                                                                                                                                                  attributes:
                                                                                                                                                                                                                                                                                        label: Environment
                                                                                                                                                                                                                                                                                              description: Relevant environment details (OS, browser, Node version, etc.)
                                                                                                                                                                                                                                                                                                    placeholder: |
                                                                                                                                                                                                                                                                                                            - OS: macOS 14.x / Windows 11 / Ubuntu 22.04
                                                                                                                                                                                                                                                                                                                    - Browser: Chrome 124 / Safari 17
                                                                                                                                                                                                                                                                                                                            - Node: 20.x
                                                                                                                                                                                                                                                                                                                                    - Project version / branch:
                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                      - type: textarea
                                                                                                                                                                                                                                                                                                                                          id: additional-information
                                                                                                                                                                                                                                                                                                                                              attributes:
                                                                                                                                                                                                                                                                                                                                                    label: Additional Context
                                                                                                                                                                                                                                                                                                                                                          description: Screenshots, logs, or anything else that might help diagnose the issue.
                                                                                                                                                                                                                                                                                                                                                          
