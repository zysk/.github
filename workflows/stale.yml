name: Stale check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "status: stale"
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days
            unless there is new activity. Leave a comment to keep it open.
          close-issue-message: >
            Closed due to inactivity. Feel free to reopen if still relevant.
          exempt-issue-labels: "pinned,security,status: blocked"
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "status: stale"
          stale-pr-message: >
            This PR has been inactive for 30 days and will be closed in 7 days.
            Push an update or comment to keep it open.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen when ready.
          exempt-pr-labels: "pinned"
          remove-stale-when-updated: true
          delete-branch: false
